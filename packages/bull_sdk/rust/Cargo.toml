[package]
name = "rust_lib_bull_sdk"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
flutter_rust_bridge = "=2.12.0"
ark_wallet = { git = "https://github.com/SatoshiPortal/ark-wallet-dart", branch = "migrate-to-bull-sdk", features = ["bull_sdk"] }
bitbox = { git = "https://github.com/SatoshiPortal/bitbox-dart", branch = "migrate-to-bull-sdk", features = ["bull_sdk"] }
bbqr = { git = "https://github.com/SatoshiPortal/bbqr-rust.git", rev = "2296a713beb58a175eb620a087f7da6826dc6f70", default-features = false }
dart_bbqr = { git = "https://github.com/SatoshiPortal/bbqr-dart", branch = "migrate-to-bull-sdk", features = ["bull_sdk"] }
boltz = { git = "https://github.com/SatoshiPortal/boltz-dart", branch = "new-swap-secrets", features = ["bull_sdk"] }
lwk = { git = "https://github.com/SatoshiPortal/lwk-dart", branch = "develop", features = ["bull_sdk"] }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
